<section id="case-previews" class="case-previews relative py-16 xl:py-24 overflow-hidden border-y border-[var(--gm-border-soft)] bg-white/60">
  <div class="container mx-auto px-4">
    <div class="flex flex-col xl:flex-row xl:items-end justify-between gap-6 mb-12">
      <div>
        <h2 class="text-3xl xl:text-4xl font-semibold text-[var(--gm-text-strong)] tracking-tight">{{ .title }}</h2>
        {{ with .subtitle }}<p class="mt-3 text-lg text-[var(--gm-text)] max-w-2xl">{{ . }}</p>{{ end }}
      </div>
      {{ with .cta }}
        <a class="text-primary font-semibold shrink-0 hover:underline" href="{{ .link | relLangURL }}">{{ .label }} →</a>
      {{ end }}
    </div>
    <div class="grid md:grid-cols-2 gap-8">
      {{ range .items }}
        <a href="{{ .link | relLangURL }}" class="group block rounded-2xl border border-[var(--gm-border-soft)] bg-[var(--gm-surface)] p-8 hover:border-primary/30 hover:shadow-md transition-all duration-300">
          <p class="text-xs font-semibold uppercase tracking-wider text-primary mb-3">{{ .tag }}</p>
          <h3 class="text-xl font-semibold text-[var(--gm-text-strong)] group-hover:text-primary transition-colors mb-3">{{ .title }}</h3>
          <p class="text-[var(--gm-text)] text-sm leading-relaxed">{{ .summary }}</p>
        </a>
      {{ end }}
    </div>
  </div>
</section>
