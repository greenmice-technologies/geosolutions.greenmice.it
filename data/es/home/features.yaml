enable: true
title: Dominios que servimos
text: Redes de energía, infraestructura de transporte, inteligencia de geomarketing
  y sistemas de aviación, donde se cruzan la corrección espacial y la disciplina operativa.
items:
- pretitle: SIG
  pretext: Ingeniería
  color: '#1AA6A6'
  icon: drafting-compass
  title: De los modelos de datos a los servicios de mapas operativos
  text: 'Diseñamos y fortalecemos arquitecturas espaciales: sistemas de referencia,
    reglas de topología, niveles de servicio y procesos de lanzamiento que sobreviven
    a auditorías y cargas máximas, no solo demostraciones.'
- pretitle: Aviación
  pretext: Aeronáutico
  color: '#1AA6A6'
  icon: radar
  title: Herramental aeronáutico alineado a procedimientos reales
  text: Creamos software que respeta los flujos de trabajo operativos, los contratos
    de datos y la cultura de seguridad, especialmente cuando el espacio aéreo y los
    sistemas terrestres deben permanecer sincronizados.
- pretitle: Plataformas
  pretext: Datos espaciales
  color: '#1AA6A6'
  icon: server
  title: Plataformas de datos espaciales que escalan
  text: Canalizaciones, catálogos, API y observabilidad para equipos que necesitan
    análisis espaciales confiables en todas las unidades de negocios y socios.
