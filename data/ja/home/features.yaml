title: 当社がサービスを提供するドメイン
text: エネルギー ネットワーク、輸送インフラ、地域マーケティング インテリジェンス、航空システムなど、空間の正確性と運用規律が交差する場所です。
items:
- pretitle: GIS
  pretext: エンジニアリング
  color: '#1AA6A6'
  icon: drafting-compass
  title: データモデルから運用マップサービスまで
  text: 私たちは空間アーキテクチャを設計して強化します。これには、リファレンス システム、トポロジ ルール、サービス層、およびデモだけでなく監査やピーク負荷にも耐えるリリース
    プロセスが含まれます。
- pretitle: 航空
  pretext: 航空
  color: '#1AA6A6'
  icon: radar
  title: 実際の手順に合わせた航空ツール
  text: 当社は、運用ワークフロー、データ契約、安全文化を尊重するソフトウェアを構築します。特に空域と地上システムの同期を維持する必要がある場合に重要です。
- pretitle: プラットフォーム
  pretext: 空間データ
  color: '#1AA6A6'
  icon: server
  title: 拡張可能な空間データ プラットフォーム
  text: ビジネスユニットやパートナー全体にわたる信頼できる空間分析を必要とするチーム向けのパイプライン、カタログ、API、可観測性。
