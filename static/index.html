    <script>
      (function () {
        var supported = ["en", "it", "es", "fr", "de", "pt", "zh-cn", "ja"];
        var prefs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "en"])
          .map(function (l) { return (l || "").toLowerCase(); });

        function resolveLang(input) {
          if (!input) return "";
          if (supported.indexOf(input) !== -1) return input;
          var base = input.split("-")[0];
          if (base === "zh") return "zh-cn";
          if (supported.indexOf(base) !== -1) return base;
          return "";
        }

        var chosen = "";
        for (var i = 0; i < prefs.length; i++) {
          chosen = resolveLang(prefs[i]);
          if (chosen) break;
        }
        if (!chosen) chosen = "en";

        var target = "https://geosolutions.greenmice.it/" + chosen + "/";
        if (window.location.href !== target) window.location.replace(target);
      })();
    </script>
